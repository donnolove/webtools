<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>攝影工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Inter", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-8 bg-gray-100">

    <header class="w-full max-w-5xl text-center mb-10">
        <h1 class="text-5xl font-extrabold text-gray-900 mb-3">攝影工具箱</h1>
        <p class="text-xl text-gray-600">整理常用的攝影相關 Web 工具，直接在瀏覽器中開啟使用。</p>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6">

        <a href="./lens_analyzer.html" class="block p-6 bg-white rounded-xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1 border-b-4 border-blue-500">
            <h2 class="text-2xl font-semibold text-blue-700 mb-2 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                鏡頭分析工具
            </h2>
            <p class="text-gray-500">分析照片資訊，整理鏡頭、焦段與拍攝參數等內容。</p>
            <span class="text-sm text-blue-500 mt-2 block">立即使用</span>
        </a>

        <a href="./card.html" target="_blank" class="block p-6 bg-white rounded-xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1 border-b-4 border-red-500">
            <h2 class="text-2xl font-semibold text-red-700 mb-2 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                卡片產生器
            </h2>
            <p class="text-gray-500">快速建立圖片卡片或排版內容，方便輸出與分享。</p>
            <span class="text-sm text-red-500 mt-2 block">立即使用</span>
        </a>

        <a href="./watermask.html" target="_blank" class="block p-6 bg-white rounded-xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1 border-b-4 border-cyan-500">
            <h2 class="text-2xl font-semibold text-cyan-700 mb-2 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3-3 3 3"></path></svg>
                浮水印工具
            </h2>
            <p class="text-gray-500">為照片加上浮水印，保留署名與品牌識別。</p>
            <span class="text-sm text-cyan-500 mt-2 block">立即使用</span>
        </a>

        <a href="./photoFrame.html" target="_blank" class="block p-6 bg-white rounded-xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1 border-b-4 border-emerald-500">
            <h2 class="text-2xl font-semibold text-emerald-700 mb-2 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M7 4v3m10-3v3M5 12l3 3 4-4 3 3 4-5"></path></svg>
                Photo Frame Maker
            </h2>
            <p class="text-gray-500">幫照片加上邊框，可調整留白、顯示 EXIF 資訊，並匯出為 JPG 或 PNG。</p>
            <span class="text-sm text-emerald-500 mt-2 block">新增功能</span>
        </a>

        <a href="./editor.html" target="_blank" class="block p-6 bg-white rounded-xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1 border-b-4 border-violet-500 md:col-span-2">
            <h2 class="text-2xl font-semibold text-violet-700 mb-2 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                編輯工具
            </h2>
            <p class="text-gray-500">進入圖片或內容編輯頁面，進一步調整與處理素材。</p>
            <span class="text-sm text-violet-500 mt-2 block">立即使用</span>
        </a>

    </main>
</body>
</html>
